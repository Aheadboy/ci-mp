name: 微信小程序交付部署 (MP CD)

on:
  push:
    branches:
      - master # 当主分支有代码推送时自动触发构建

jobs:
  deploy:
    runs-on: ubuntu-latest # 使用纯净的 Linux 虚拟环境

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境（锁定你刚才测试通过的 v18 或 v20 均可）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm' # 自动缓存依赖，加速后续构建

      # 3. 强行安装你脚本需要的微信 CI 依赖（纯局部安装，断绝全局污染）
      - name: Install Dependencies
        run: |
          npm init -y
          npm install miniprogram-ci --save-dev

      # 4. 从 GitHub Secrets 中安全还原出物理 private.key 文件
      - name: Restore Private Key File
        run: |
          echo "${{ secrets.MINIPROGRAM_PRIVATE_KEY }}" > ./private.key

      # # 5. 注入环境变量，点燃你的 upload.js 脚本
      # - name: Run Upload Script
      #   env:
      #     WX_MINI_APPID: ${{ secrets.MINIPROGRAM_APPID }}
      #     WX_MINI_VERSION: "1.0.2" # 你也可以利用 GitHub 变量动态改成自动计算的版本号
      #     WX_MINI_DESC: "来自 GitHub Actions 的自动化推送 #${{ github.run_number }}"
      #   run: |
      #     node upload.js
      - name: 🔍 云端沙盒路径与文件安全诊断
        run: |
          echo "=== 1. 当前工作目录路径 ==="
          pwd
          
          echo "=== 2. 检查 app.json 是否在当前目录 ==="
          ls -la app.json
          
          echo "=== 3. 检查 project.config.json 的 appid（防止空指或游客号） ==="
          cat project.config.json | grep -i appid || echo "未找到 project.config.json"
          
          echo "=== 4. 诊断 private.key 的文件行数与首尾格式 ==="
          wc -l ./private.key
          head -n 1 ./private.key
          tail -n 1 ./private.key

      # 🚀 运行你修改后的强力日志脚本
      - name: Run Upload Script
        env:
          # ⚡ 必须确保这里的名字和 secrets 里的名字完全一致，且没有拼写错误
          WX_MINI_APPID: ${{ secrets.MINIPROGRAM_APPID }} 
          WX_MINI_VERSION: "1.0.3"
          WX_MINI_DESC: "来自 GitHub Actions 的自动交付 #${{ github.run_number }}"
        run: |
          node upload2.js