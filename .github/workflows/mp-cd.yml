name: 微信小程序 CI/CD

on:
  push:
    branches:
      - master # 当 master 分支有 push 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn' # 自动缓存 yarn 依赖，加速后续构建

      # 3. 安装项目依赖
      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile

      # 4. 提取上传密钥并写入文件
      # 微信官方要求私钥必须以文件形式存在，这里从 GitHub Secrets 读取并还原为本地文件
      - name: Deploy Private Key
        run: |
          echo "${{ secrets.MINIPROGRAM_PRIVATE_KEY }}" > private.key

      # 5. 使用 miniprogram-ci 上传代码
      # 由于你的 app.json 在根目录，所以 project_path 设为 ./ 
      - name: Upload to WeChat Miniprogram
        run: |
          npx miniprogram-ci \
            upload \
            --appid wxc7004936e49228d0 \
            --private-key-path ./private.key \
            --project-path ./ \
            --version 1.0.${{ github.run_number }} \
            --upload-version 1.0.${{ github.run_number }} \
            --desc "Automated deploy by GitHub Actions (Run #${{ github.run_number }})" \
            --upload-description "CI/CD 自动上传" \
            --enable-es6 true \
            --enable-minify true
